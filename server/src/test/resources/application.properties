# 테스트 전용 설정 — 실제 시크릿 없음, CI의 postgres/redis 서비스 컨테이너에 맞춘 값.
# src/test/resources는 테스트 클래스패스에서 src/main/resources보다 우선하므로,
# 로컬 개발자의 gitignore된 application.properties 없이도 `./gradlew test`가 돈다.
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

kakao.api.key=test-key
gemini.api.key=test-key
groq.api.key=test-key
tourapi.service.key=test-key
